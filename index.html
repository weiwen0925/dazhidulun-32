<html lang="zh-Hant"><head><meta charset="utf-8"/><meta content="width=device-width,initial-scale=1" name="viewport"/><title>大智度論 卷三十二 · 第一品至第十品彙整本</title><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&amp;family=Noto+Sans+TC:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/><style>
:root{
 --bg:#f7f3ec;--text:#2c2416;--text2:#5a4e3a;--text-muted:#6B5B4B;

 --card:#fffdf7;--verseBg:#f0e8d8;--verseBd:#c4956a;
 --sbW:96px;--sbBg:#1e1a14;--sbText:#d4c4a8;
 --headGrad:linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%);--r:8px;
}
*{box-sizing:border-box;}
html,body{scrollbar-width:none;-ms-overflow-style:none;}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;width:0;height:0;}
body{margin:0;background:var(--bg);color:var(--text);
 font-family:"Noto Serif TC","Songti TC",Georgia,serif;line-height:1.8;
 -webkit-user-select:none;-moz-user-select:none;user-select:none;}
a{color:inherit;text-decoration:none;}

/* 側欄 */
#sb{position:fixed;left:0;top:0;width:var(--sbW);height:100vh;background:var(--sbBg);
 color:var(--sbText);z-index:100;display:flex;flex-direction:column;align-items:center;
 padding:0 0 16px;overflow-y:auto;scrollbar-width:none;}
#sb::-webkit-scrollbar{display:none;}
.sb-head{position:sticky;top:0;width:100%;background:var(--sbBg);z-index:5;
 padding:12px 6px 10px;border-bottom:1px solid rgba(184,134,11,.25);}
.sb-brand{display:block;text-align:center;color:var(--gold);cursor:pointer;
 font-family:"Noto Sans TC",sans-serif;line-height:1.5;transition:color .25s;}
.sb-brand:hover{color:var(--goldL);}
.sb-brand .l1{display:block;font-size:11px;letter-spacing:1.5px;opacity:.8;}
.sb-brand .l2{display:block;font-size:13px;font-weight:700;letter-spacing:2px;color:var(--goldL);margin-top:2px;}
.sb-brand .l3{display:block;font-size:10px;opacity:.55;margin-top:3px;}
.sb-nav{display:flex;flex-direction:column;align-items:center;gap:3px;width:100%;
 padding:8px 0;flex:1;}
.sb-item{display:flex;flex-direction:column;align-items:center;gap:3px;width:100%;
 padding:4px 3px;cursor:pointer;transition:background .2s;border-radius:6px;}
.sb-item:hover{background:rgba(184,134,11,.14);}
.sb-item.active .sb-circle{background:var(--gold);color:#1e1a14;
 box-shadow:0 0 12px rgba(184,134,11,.7);}
.sb-circle{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;
 justify-content:center;border:1px solid rgba(212,196,168,.4);font-size:15px;
 font-weight:600;font-family:"Noto Sans TC",sans-serif;transition:.2s;}
.sb-label{font-size:11px;letter-spacing:.3px;opacity:.86;text-align:center;
 font-family:"Noto Sans TC",sans-serif;}

/* 主區 */
.main{margin-left:var(--sbW);}
.site-hero{position:relative;background:var(--headGrad);color:#f7f3ec;
 text-align:center;padding:74px 24px 60px;overflow:hidden;}
.site-hero::before{content:"般若";position:absolute;top:50%;left:50%;
 transform:translate(-50%,-50%);font-size:230px;color:rgba(212,168,75,.04);
 font-weight:900;white-space:nowrap;pointer-events:none;}
.hero-in{position:relative;z-index:1;}
.hero-title{font-size:56px;font-weight:900;color:var(--goldL);letter-spacing:6px;margin:0 0 14px;}
.hero-sub{font-size:20px;color:#e8dcc4;letter-spacing:2px;margin:0 0 6px;}
.hero-range{font-size:17px;color:var(--accentL);letter-spacing:1.5px;margin:10px 0 0;}
.hero-en{font-size:13px;color:rgba(212,196,168,.6);letter-spacing:2px;margin-top:16px;
 font-family:"Noto Sans TC",sans-serif;text-transform:uppercase;}

/* 前言 */
.preface{max-width:860px;margin:46px auto 10px;padding:0 28px;}
.preface-title{text-align:center;font-size:30px;color:var(--accent);letter-spacing:8px;margin:0 0 8px;}
.preface-rule{width:70px;height:3px;background:var(--gold);margin:0 auto 24px;border-radius:2px;}
.preface p{font-size:19px;line-height:2.1;color:var(--text2);margin:0 0 16px;text-align:justify;}

/* 總目錄 */
.toc-section{max-width:1100px;margin:40px auto 20px;padding:0 28px;}
.toc-title{text-align:center;font-size:34px;color:var(--accent);letter-spacing:10px;margin:0 0 8px;}
.toc-desc{text-align:center;font-size:17px;color:var(--text-muted);letter-spacing:1.5px;margin:0 0 28px;
 font-family:"Noto Sans TC",sans-serif;}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;}
.toc-card{display:flex;align-items:center;gap:16px;background:var(--card);border:1px solid var(--border);
 border-radius:10px;padding:16px 20px;cursor:pointer;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.toc-card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(91,58,41,.12);border-color:var(--gold);}
.toc-num{flex-shrink:0;width:46px;height:46px;border-radius:50%;background:var(--headGrad);
 color:var(--goldL);display:flex;align-items:center;justify-content:center;font-size:20px;
 font-weight:700;font-family:"Noto Sans TC",sans-serif;}
.toc-body{flex:1;}
.toc-name{font-size:19.5px;color:var(--text);line-height:1.5;font-weight:600;}
.toc-sub{font-size:13.5px;color:var(--text-muted);margin-top:4px;font-family:"Noto Sans TC",sans-serif;}

/* 章節 */
.chapter{max-width:1000px;margin:30px auto 0;padding:0 24px;}
.ch-head{background:var(--headGrad);color:#f7f3ec;text-align:center;padding:38px 26px;
 border-radius:14px 14px 0 0;position:relative;}
.ch-head::after{content:"";position:absolute;bottom:0;left:50%;transform:translateX(-50%);
 width:80px;height:3px;background:var(--gold);}
.ch-pin{font-size:14px;color:var(--accentL);letter-spacing:4px;font-family:"Noto Sans TC",sans-serif;}
.ch-title{font-size:34px;font-weight:900;color:var(--goldL);letter-spacing:4px;margin:10px 0 8px;}
.ch-subtitle{font-size:17px;color:#e0d4bc;letter-spacing:1px;}
.ch-body{background:#fff;border:1px solid var(--border);border-top:0;
 border-radius:0 0 14px 14px;padding:28px 30px 30px;}

/* 橋接 */
.bridge{background:linear-gradient(135deg,#fffdf5,#f5ecd8);border:1px solid var(--border);
 border-left:5px solid var(--gold);border-radius:10px;padding:18px 24px;margin:0 0 26px;
 box-shadow:0 2px 10px rgba(91,58,41,.06);}
.bridge-outro{border-left-color:var(--accentL);background:linear-gradient(135deg,#fdf8e8,#f2e6c8);
 margin-top:30px;margin-bottom:6px;}
.bridge-label{display:inline-block;font-family:"Noto Sans TC",sans-serif;font-size:12.5px;
 background:var(--gold);color:#fff;padding:3px 12px;border-radius:12px;letter-spacing:2.2px;margin-bottom:10px;}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2.1;font-size:18.5px;text-align:justify;}

/* iframe */
.ch-frame{display:block;width:100%;border:0;background:#fffdf7;border:1px solid var(--border);
 border-radius:12px;box-shadow:0 4px 20px rgba(91,58,41,.1);margin:0 0 8px;min-height:180px;}
.next-link{display:inline-block;margin:8px 0 4px;font-family:"Noto Sans TC",sans-serif;
 font-size:17px;color:var(--accent);border-bottom:1px dashed var(--accentL);padding-bottom:2px;cursor:pointer;}
.next-link:hover{color:var(--gold);}

/* 進度膠囊 */
.read-progress{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:120;
 background:rgba(30,26,20,.92);color:var(--gold);padding:9px 24px;border-radius:30px;
 border:1px solid rgba(184,134,11,.5);box-shadow:0 4px 18px rgba(0,0,0,.25);
 font-family:"Noto Sans TC",sans-serif;font-size:14px;letter-spacing:2px;display:flex;
 align-items:center;gap:12px;pointer-events:none;user-select:none;backdrop-filter:blur(6px);
 transition:opacity .45s ease,transform .45s ease;}
.read-progress.hide-near-end{opacity:0;transform:translateX(-50%) translateY(28px);}
.read-progress .rp-label{font-size:13px;opacity:.85;letter-spacing:4px;color:var(--goldL);}
.read-progress .rp-bar{width:148px;height:4px;background:rgba(212,196,168,.18);border-radius:2px;
 overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;
 background:linear-gradient(90deg,var(--gold),var(--goldL));width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;font-size:13px;}

#backTop{position:fixed;right:22px;bottom:22px;width:44px;height:44px;border-radius:50%;
 background:var(--headGrad);color:var(--goldL);border:1px solid var(--gold);font-size:20px;
 cursor:pointer;display:none;align-items:center;justify-content:center;z-index:120;
 box-shadow:0 4px 14px rgba(0,0,0,.25);}
#backTop.show{display:flex;}
#sbToggle{display:none;}
.site-footer{text-align:center;padding:40px 24px;color:var(--text-muted);font-size:15px;
 font-family:"Noto Sans TC",sans-serif;border-top:1px solid var(--border);margin-top:40px;}

@media(max-width:900px){
 #sb{transform:translateX(-100%);transition:transform .3s;}
 #sb.open{transform:none;}
 .main{margin-left:0;}
 #sbToggle{display:flex;position:fixed;top:14px;left:14px;z-index:130;width:42px;height:42px;
  border-radius:8px;background:var(--sbBg);color:var(--gold);border:0;font-size:20px;
  align-items:center;justify-content:center;cursor:pointer;}
 .hero-title{font-size:38px;}
 .toc-grid{grid-template-columns:1fr;}
}

.sb-x:hover .sb-x-glyph{border-color:var(--gold,#b8860b);color:#fff;

.sb-x:hover .sb-x-label{color:var(--goldL,#d4a84b);opacity:1;}
.sb-x-hub .sb-x-glyph{background:linear-gradient(135deg,

  font-weight:700;letter-spacing:1px;}

var rpFill=document.getElementById('rpFill'),rpPct=document.getElementById('rpPct');
function updateProgress(){var sh=document.documentElement.scrollHeight-window.innerHeight;
 var pct=sh>0?Math.min(100,Math.max(0,window.scrollY/sh*100)):0;
 if(rpFill)rpFill.style.width=pct+'%';if(rpPct)rpPct.textContent=Math.round(pct)+'%';}
window.addEventListener('scroll',updateProgress,{passive:true});updateProgress();

function resizeFrame(f){try{var d=f.contentDocument||f.contentWindow.document;if(!d||!d.body)return;
 d.body.style.minHeight='0';d.body.style.height='auto';
 if(d.documentElement){d.documentElement.style.minHeight='0';d.documentElement.style.height='auto';}
 var h=d.body.scrollHeight;if(h>100){f.style.height=h+'px';f.style.minHeight='0';}}catch(e){}}
function resizeAllFrames(){document.querySelectorAll('iframe.ch-frame').forEach(resizeFrame);
 if(typeof updateProgress==='function')updateProgress();}
function setupFrame(f){var tries=0;function tick(){tries++;resizeFrame(f);if(tries<30)setTimeout(tick,200);}
 if(f.contentDocument&&f.contentDocument.readyState==='complete'){tick();}else{f.addEventListener('load',tick);}}
window.setupFrame=setupFrame;window.resizeAllFrames=resizeAllFrames;
document.querySelectorAll('iframe.ch-frame').forEach(setupFrame);
var rzT;window.addEventListener('resize',function(){clearTimeout(rzT);rzT=setTimeout(resizeAllFrames,200);});
document.addEventListener('click',function(e){var a=e.target;while(a&&a.tagName!=='A')a=a.parentElement;
 if(!a)return;var h=a.getAttribute('href');if(!h||h.charAt(0)!=='#'||h.length<2)return;
 var id=h.substring(1);var el=document.getElementById(id);if(!el)return;e.preventDefault();
 resizeAllFrames();setTimeout(function(){resizeAllFrames();var rect=el.getBoundingClientRect();
 var y=window.scrollY+rect.top-20;window.scrollTo({top:y,behavior:'smooth'});},60);},true);
var _rt=0,_riv=setInterval(function(){_rt++;resizeAllFrames();if(_rt>50)clearInterval(_riv);},300);

var secs=document.querySelectorAll('.chapter');var items=document.querySelectorAll('.sb-item');
function highlight(){var idx=-1;for(var i=0;i<secs.length;i++){
 if(secs[i].getBoundingClientRect().top<window.innerHeight*0.35)idx=i;}
 items.forEach(function(it,j){it.classList.toggle('active',j===idx);});
 if(idx>=0){var act=items[idx];var sb=document.getElementById('sb');
  if(act){var r=act.getBoundingClientRect();if(r.top<70||r.bottom>window.innerHeight-20)
   act.scrollIntoView({block:'center',behavior:'smooth'});}}}
window.addEventListener('scroll',highlight,{passive:true});highlight();

var bt=document.getElementById('backTop');
window.addEventListener('scroll',function(){if(bt)bt.classList.toggle('show',window.scrollY>600);},{passive:true});
if(bt)bt.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});
var sbBrand=document.getElementById('sbBrand');
if(sbBrand)sbBrand.addEventListener('click',function(e){e.preventDefault();window.scrollTo({top:0,behavior:'smooth'});});
var sbToggle=document.getElementById('sbToggle');
if(sbToggle)sbToggle.addEventListener('click',function(){document.getElementById('sb').classList.toggle('open');});

(function(){var cap=document.getElementById('readProgress');if(!cap)return;
 function setHide(on){cap.classList.toggle('hide-near-end',!!on);}
 var t=document.querySelector('.site-footer');if(!t)return;
 if('IntersectionObserver'in window){var io=new IntersectionObserver(function(en){
  setHide(en.some(function(e){return e.isIntersecting;}));},{rootMargin:'0px 0px -20px 0px',threshold:0.01});
  io.observe(t);}})();

(function(){var blk=function(e){e.preventDefault();return false;};
['contextmenu','copy','cut','selectstart','dragstart'].forEach(function(ev){document.addEventListener(ev,blk,true);});
document.addEventListener('keydown',function(e){var k=e.key;
 if(e.ctrlKey&&'cCaAsSpPuUxX'.indexOf(k)>=0)blk(e);if(k==='F12')blk(e);
 if(e.ctrlKey&&e.shiftKey&&'IJCK'.indexOf(k)>=0)blk(e);},true);})();

/* 節層級深連結 #chapter-品-章-節（跨 iframe） */
function wyDeepLink(hash){
 var m=/^#chapter-(\d+)-(\d+)-(\d+)$/.exec(hash||'');
 if(!m) return false;
 var sec=document.getElementById('chapter-'+m[1]);
 if(!sec) return false;
 var ifr=sec.querySelector('iframe.ch-frame');
 if(!ifr) return false;
 try{sec.scrollIntoView();}catch(e){}
 var id=hash.substring(1);
 (function tryScroll(t){
  try{var d=ifr.contentDocument;var el=d&&d.getElementById(id);
   if(el){if(typeof resizeAllFrames==='function')resizeAllFrames();
    var er=el.getBoundingClientRect(),fr=ifr.getBoundingClientRect();
    window.scrollTo({top:window.scrollY+fr.top+er.top-60,behavior:'smooth'});return;}
  }catch(e){}
  if(t<40)setTimeout(function(){tryScroll(t+1);},150);
 })(0);
 return true;
}
window.wyDeepLink=wyDeepLink;
window.addEventListener('hashchange',function(){wyDeepLink(location.hash);});
function wyInitialDeep(){if(location.hash&&/^#chapter-\d+-\d+-\d+$/.test(location.hash))setTimeout(function(){wyDeepLink(location.hash);},400);}
if(window.__wyReady&&window.__wyReady.then){window.__wyReady.then(wyInitialDeep);}
else{if(document.readyState==='complete')wyInitialDeep();else window.addEventListener('load',wyInitialDeep);}

<script id="wy-print-intercept">

      e.preventDefault(); e.stopPropagation();
      return false;

<script id="wy-decoder">
(function(){
  if(!window.__wyReady) return;
  var KEY = "wy-dazhidulun-32-v1";
  function _dec(b64){
    try{
      var raw = atob(b64);
      var bytes = new Uint8Array(raw.length);
      for(var i=0;i<raw.length;i++){
        bytes[i] = (raw.charCodeAt(i) ^ KEY.charCodeAt(i % KEY.length)) & 0xff;
      }
      if(typeof TextDecoder !== "undefined"){
        return new TextDecoder("utf-8").decode(bytes);
      }
      var s = "";
      for(var j=0;j<bytes.length;j++) s += String.fromCharCode(bytes[j]);
      return decodeURIComponent(escape(s));
    }catch(e){ return null; }
  }
  window.__wyReady.then(function(ok){
    if(!ok) return;
    document.querySelectorAll("iframe.ch-frame[data-c]").forEach(function(oldF){
      var decoded = _dec(oldF.getAttribute("data-c"));
      if(!decoded) return;
      var newF = document.createElement("iframe");
      for(var i=0;i<oldF.attributes.length;i++){
        var a = oldF.attributes[i];
        if(a.name === "data-c" || a.name === "srcdoc") continue;
        try{ newF.setAttribute(a.name, a.value); }catch(e){}
      }
      newF.setAttribute("srcdoc", decoded);
      try{ oldF.parentNode.replaceChild(newF, oldF); }catch(e){ return; }
      if(typeof window.setupFrame === "function"){
        try{ window.setupFrame(newF); }catch(e){}
      }
    });
    document.querySelectorAll("[data-wytext]").forEach(function(el){
      var t = _dec(el.getAttribute("data-wytext"));
      if(t === null) return;
      el.innerHTML = t;
      el.removeAttribute("data-wytext");
    });
    if(typeof window.resizeAllFrames === "function"){
      [150, 800, 2000].forEach(function(ms){
        setTimeout(function(){ try{ window.resizeAllFrames(); }catch(e){} }, ms);
      });
    }
  });
})();
</script>
