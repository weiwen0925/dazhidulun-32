<style>
:root{
  --bg:#f7f3ec;--text:#2c2416;--text2:#5a4e3a;--text-muted:#6B5B4B;
  --accent:#8b5e3c;--accentL:#c4956a;--accent-red:#8B2500;
  --gold:#b8860b;--goldL:#d4a84b;--gold-light:#C9A84C;
  --border:#d4c4a8;--border-light:#EDE8E0;--card:#fffdf7;
  --verseBg:#f0e8d8;--verseBd:#c4956a;
  --sbW:76px;--sbBg:#1e1a14;--sbText:#d4c4a8;
  --headGrad:linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%);
  --r:8px;--shadow:rgba(91,58,41,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{scrollbar-width:none;-ms-overflow-style:none;}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;width:0;height:0;}
body{
  font-family:"Noto Serif TC","Source Han Serif TC","Songti TC",Georgia,serif;
  background:var(--bg);color:var(--text);line-height:1.8;
  -webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;
  -webkit-touch-callout:none;
}
a{color:inherit;text-decoration:none;}

/* ───── 側欄 ───── */
#sb{position:fixed;left:0;top:0;width:var(--sbW);height:100vh;
  background:var(--sbBg);color:var(--sbText);z-index:100;
  display:flex;flex-direction:column;align-items:center;
  padding:0 0 16px;overflow-y:auto;scrollbar-width:none;}
#sb::-webkit-scrollbar{display:none;}
.sb-brand{position:sticky;top:0;width:100%;
  font-family:"Noto Sans TC",sans-serif;font-size:11px;letter-spacing:2px;
  color:var(--gold);text-align:center;line-height:1.5;
  background:linear-gradient(to bottom,var(--sbBg) 78%,rgba(30,26,20,0));
  padding:14px 4px 12px;margin-bottom:6px;z-index:5;
  text-decoration:none;cursor:pointer;
  transition:color .25s,background .25s;display:block;
  border-bottom:1px solid rgba(184,134,11,.25);}
.sb-brand:hover{color:var(--goldL);}
.sb-brand .sb-brand-line1{display:block;font-size:11px;letter-spacing:1.5px;opacity:.78;}
.sb-brand .sb-brand-line2{display:block;font-size:13px;font-weight:700;
  letter-spacing:2.2px;color:var(--goldL);margin-top:2px;}
.sb-brand .sb-brand-arrow{display:block;font-size:10px;opacity:.55;margin-top:2px;}
.sb-nav{display:flex;flex-direction:column;gap:6px;width:100%;align-items:center;padding-top:4px;}
.sb-item{display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:3px 4px;width:100%;cursor:pointer;transition:all .25s;border-radius:6px;}
.sb-item .sb-circle{width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  border:1px solid rgba(212,196,168,.4);font-family:"Noto Sans TC",sans-serif;
  font-size:15px;color:var(--sbText);transition:all .25s;}
.sb-item .sb-label{font-family:"Noto Sans TC",sans-serif;font-size:11.5px;
  color:var(--sbText);opacity:.7;text-align:center;line-height:1.25;}
.sb-item:hover .sb-circle{border-color:var(--gold);color:var(--goldL);}
.sb-item.active .sb-circle{background:var(--gold);color:#1e1a14;
  border-color:var(--gold);box-shadow:0 0 12px rgba(184,134,11,.6);}
.sb-item.active .sb-label{opacity:1;color:var(--goldL);}

#sbToggle{display:none;position:fixed;top:14px;left:14px;z-index:130;
  width:42px;height:42px;border-radius:8px;border:1px solid var(--border);
  background:var(--sbBg);color:var(--gold);font-size:20px;cursor:pointer;}

/* ───── 底部進度膠囊 ───── */
.read-progress{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
  z-index:120;background:rgba(30,26,20,.92);color:var(--gold);
  padding:9px 24px;border-radius:30px;border:1px solid rgba(184,134,11,.5);
  box-shadow:0 4px 18px rgba(0,0,0,.25);font-family:"Noto Sans TC",sans-serif;
  font-size:14px;letter-spacing:2px;display:flex;align-items:center;gap:12px;
  pointer-events:none;user-select:none;backdrop-filter:blur(6px);
  transition:opacity .45s ease,transform .45s ease;}
.read-progress.hide-near-end{opacity:0;transform:translateX(-50%) translateY(28px);}
.read-progress .rp-bar{width:148px;height:4px;background:rgba(212,196,168,.18);
  border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;
  background:linear-gradient(90deg,var(--gold),var(--goldL));width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;font-size:13px;}
.read-progress .rp-label{font-size:13px;opacity:.85;letter-spacing:4px;color:var(--goldL);}

/* ───── main ───── */
.main{margin-left:var(--sbW);}

/* ───── Hero ───── */
.site-hero{position:relative;background:var(--headGrad);color:#f5ecd8;
  padding:90px 24px 78px;text-align:center;overflow:hidden;}
.site-hero::before{content:"般若";position:absolute;font-size:340px;
  font-weight:900;color:rgba(212,168,75,.04);top:50%;left:50%;
  transform:translate(-50%,-50%);white-space:nowrap;pointer-events:none;}
.hero-inner{position:relative;z-index:1;}
.hero-eyebrow{font-family:"Noto Sans TC",sans-serif;font-size:13px;
  letter-spacing:5px;color:var(--goldL);margin-bottom:22px;}
.hero-title{font-size:56px;font-weight:900;color:#f0e6cf;letter-spacing:8px;margin-bottom:14px;}
.hero-subtitle{font-size:20px;color:var(--goldL);letter-spacing:6px;margin-bottom:8px;}
.hero-sub2{font-size:18px;color:#cdbf9d;letter-spacing:3px;margin-bottom:24px;}
.hero-range{font-family:"Noto Sans TC",sans-serif;font-size:14px;
  color:#a89878;letter-spacing:2px;border-top:1px solid rgba(184,134,11,.3);
  display:inline-block;padding-top:16px;}

/* ───── 前言 ───── */
.preface{max-width:860px;margin:54px auto 0;padding:0 28px;}
.preface-title{font-size:30px;color:var(--accent);text-align:center;
  letter-spacing:4px;margin-bottom:24px;font-weight:700;}
.preface-title::after{content:"";display:block;width:54px;height:3px;
  background:var(--gold);margin:14px auto 0;}
.preface p{font-size:19px;line-height:2.1;color:var(--text2);margin-bottom:16px;text-align:justify;}

/* ───── 總目錄 ───── */
.toc-section{max-width:1100px;margin:58px auto 30px;padding:0 28px;}
.toc-title{font-size:34px;color:var(--accent);text-align:center;
  letter-spacing:8px;font-weight:700;}
.toc-title::after{content:"";display:block;width:54px;height:3px;
  background:var(--gold);margin:14px auto 0;}
.toc-desc{text-align:center;font-family:"Noto Sans TC",sans-serif;font-size:17px;
  color:var(--text-muted);margin:16px 0 30px;letter-spacing:1px;}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;}
.toc-card{background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:20px 22px;display:flex;gap:16px;align-items:flex-start;
  transition:all .25s;box-shadow:0 1px 3px var(--shadow);}
.toc-card:hover{transform:translateY(-3px);box-shadow:0 8px 22px rgba(91,58,41,.14);
  border-color:var(--gold);}
.toc-num{flex-shrink:0;width:40px;height:40px;border-radius:50%;
  background:var(--gold);color:#fff;display:flex;align-items:center;justify-content:center;
  font-family:"Noto Sans TC",sans-serif;font-size:17px;font-weight:700;}
.toc-body{flex:1;}
.toc-name{font-size:19.5px;color:var(--text);font-weight:600;line-height:1.7;margin-bottom:6px;}
.toc-sub{font-family:"Noto Sans TC",sans-serif;font-size:13.5px;
  color:var(--text-muted);line-height:1.6;}

/* ───── 章節 ───── */
.chapter{margin:48px 0 0;}
.ch-head{background:var(--headGrad);color:#f5ecd8;padding:54px 24px 48px;text-align:center;}
.ch-num{font-family:"Noto Sans TC",sans-serif;font-size:18px;
  letter-spacing:3px;color:var(--goldL);margin-bottom:14px;}
.ch-name{font-size:34px;font-weight:900;color:#f0e6cf;letter-spacing:3px;margin-bottom:12px;}
.ch-sub{font-size:17px;color:#cdbf9d;letter-spacing:2px;}
.ch-head::after{content:"";display:block;width:60px;height:3px;
  background:var(--gold);margin:22px auto 0;}
.ch-body{max-width:980px;margin:0 auto;padding:34px 28px 10px;}

/* ───── 橋接 ───── */
.bridge{background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);border-left:5px solid var(--gold);
  border-radius:10px;padding:18px 24px;margin:0 0 26px;
  box-shadow:0 2px 10px rgba(91,58,41,.06);}
.bridge-outro{border-left-color:var(--accentL);
  background:linear-gradient(135deg,#fdf8e8,#f2e6c8);margin-top:30px;margin-bottom:14px;}
.bridge-label{display:inline-block;font-family:"Noto Sans TC",sans-serif;font-size:12.5px;
  background:var(--gold);color:#fff;padding:3px 12px;border-radius:12px;
  letter-spacing:2.2px;margin-bottom:10px;}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2.1;font-size:18.5px;text-align:justify;}

/* ───── iframe ───── */
.ch-frame{display:block;width:100%;border:0;background:#fffdf7;
  border:1px solid var(--border);border-radius:12px;
  box-shadow:0 4px 20px rgba(91,58,41,.1);margin:0 0 8px;min-height:180px;}

.next-link{display:inline-block;font-family:"Noto Sans TC",sans-serif;font-size:17px;
  color:var(--accent);border:1px solid var(--border);border-radius:8px;
  padding:10px 20px;margin:8px 0 4px;transition:all .25s;}
.next-link:hover{background:var(--gold);color:#fff;border-color:var(--gold);}

/* ───── 頁尾 ───── */
.site-footer{background:var(--sbBg);color:#a89878;text-align:center;
  padding:40px 24px;margin-top:60px;font-family:"Noto Sans TC",sans-serif;font-size:15px;
  letter-spacing:2px;line-height:1.9;}

#backTop{position:fixed;right:24px;bottom:24px;width:44px;height:44px;
  border-radius:50%;border:1px solid var(--border);background:var(--sbBg);
  color:var(--gold);font-size:18px;cursor:pointer;z-index:115;display:none;}

/* ───── 1.2x 字級放大 ───── */
body{font-size:20px;}

@media(max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .3s;}
  #sb.open{transform:translateX(0);}
  #sbToggle{display:block;}
  .main{margin-left:0;}
  .site-hero{padding:64px 18px 52px;}
  .hero-title{font-size:40px;}
  .ch-head{padding:40px 18px 34px;}
  .ch-name{font-size:26px;}
  .ch-body{padding:24px 16px 8px;}
  .toc-grid{grid-template-columns:1fr;}
}
@media(max-width:600px){
  body{font-size:17px;}
  .hero-title{font-size:32px;}
}

/* ===== 1.2x 字級放大（外層）===== */
body{font-size:20px!important;}
.hero-title{font-size:56px!important;}
.hero-subtitle{font-size:20px!important;}
.hero-sub2,.hero-meta{font-size:18px!important;}
.hero-range{font-size:14px!important;}
.preface p{font-size:19px!important;line-height:2.1!important;}
.preface-title{font-size:30px!important;}
.toc-title{font-size:34px!important;}
.toc-desc{font-size:17px!important;}
.toc-name{font-size:19.5px!important;line-height:1.7!important;}
.toc-num{font-size:17px!important;}
.toc-sub{font-size:13.5px!important;}
.bridge p{font-size:18.5px!important;line-height:2.1!important;}
.bridge-label{font-size:12.5px!important;letter-spacing:2.2px!important;}
.ch-num{font-size:18px!important;}
.ch-name{font-size:34px!important;}
.ch-sub{font-size:17px!important;}
.next-link{font-size:17px!important;}
.read-progress{font-size:14px!important;padding:9px 24px!important;}
.read-progress .rp-bar{width:148px!important;height:4px!important;}
.read-progress .rp-pct{font-size:13px!important;}
.read-progress .rp-label{font-size:12px!important;}
.sb-circle{font-size:15px!important;}
.sb-label{font-size:11.5px!important;}
.site-footer{font-size:15px!important;}

    }else{
      var check=function(){
        var dh=document.documentElement.scrollHeight;
        var sb=window.scrollY+window.innerHeight;
        setHide(dh-sb<240);
      };
      window.addEventListener('scroll',check,{passive:true});check();
    }
  })();

  /* iframe 自動高度 */
  function resizeFrame(f){
    try{
      var d=f.contentDocument||f.contentWindow.document;
      if(!d||!d.body)return;
      d.body.style.minHeight='0';d.body.style.height='auto';
      if(d.documentElement){
        d.documentElement.style.minHeight='0';
        d.documentElement.style.height='auto';
      }
      var h=d.body.scrollHeight;
      if(h>100){f.style.height=h+'px';f.style.minHeight='0';}
    }catch(e){}
  }
  function resizeAllFrames(){
    document.querySelectorAll('iframe.ch-frame').forEach(resizeFrame);
    if(typeof updateProgress==='function')updateProgress();
  }
  function setupFrame(f){
    var tries=0;
    function tick(){tries++;resizeFrame(f);if(tries<30)setTimeout(tick,200);}
    if(f.contentDocument&&f.contentDocument.readyState==='complete'){tick();}
    else{f.addEventListener('load',tick);}
  }
  document.querySelectorAll('iframe.ch-frame').forEach(setupFrame);
  var rzT;
  window.addEventListener('resize',function(){
    clearTimeout(rzT);rzT=setTimeout(resizeAllFrames,200);
  });

  /* 錨點點擊防錯跳 */
  document.addEventListener('click',function(e){
    var a=e.target;
    while(a&&a.tagName!=='A')a=a.parentElement;
    if(!a)return;
    var h=a.getAttribute('href');
    if(!h||h.charAt(0)!=='#'||h.length<2)return;
    var id=h.substring(1);
    var el=document.getElementById(id);
    if(!el)return;
    e.preventDefault();
    resizeAllFrames();
    setTimeout(function(){
      resizeAllFrames();
      var rect=el.getBoundingClientRect();
      var y=window.scrollY+rect.top-20;
      window.scrollTo({top:y,behavior:'smooth'});
    },60);
  },true);

  var _rt=0,_riv=setInterval(function(){
    _rt++;resizeAllFrames();if(_rt>50)clearInterval(_riv);
  },300);

  /* 側欄高亮 */
  var items=document.querySelectorAll('.sb-item');
  var chapters=document.querySelectorAll('.chapter');
  function updateActive(){
    var idx=0;
    for(var i=0;i<chapters.length;i++){
      if(chapters[i].getBoundingClientRect().top<window.innerHeight*0.35)idx=i;
    }
    items.forEach(function(it,i){it.classList.toggle('active',i===idx);});
    var act=items[idx];
    if(act){
      var sb=document.getElementById('sb');
      var r=act.getBoundingClientRect();
      if(r.top<60||r.bottom>window.innerHeight-20){
        sb.scrollTop=act.offsetTop-window.innerHeight/2;
      }
    }
  }
  window.addEventListener('scroll',updateActive,{passive:true});
  updateActive();

  /* 回頂 */
  var bt=document.getElementById('backTop');
  window.addEventListener('scroll',function(){
    bt.style.display=window.scrollY>600?'block':'none';
  },{passive:true});
  bt.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});

  /* sticky 卷名回頂 */
  var sbBrand=document.getElementById('sbBrand');
  if(sbBrand){
    sbBrand.addEventListener('click',function(e){
      e.preventDefault();window.scrollTo({top:0,behavior:'smooth'});
    });
  }

  /* 漢堡選單 */
  var tg=document.getElementById('sbToggle');
  var sb=document.getElementById('sb');
  if(tg){tg.addEventListener('click',function(){sb.classList.toggle('open');});}
  items.forEach(function(it){
    it.addEventListener('click',function(){
      if(window.innerWidth<=900)sb.classList.remove('open');
    });
  });

  /* 外層防複製 */
  var blk=function(e){e.preventDefault();return false;};
  ['contextmenu','copy','cut','selectstart','dragstart'].forEach(function(ev){
    document.addEventListener(ev,blk,true);
  });
  document.addEventListener('keydown',function(e){
    var k=e.key;
    if(e.ctrlKey&&(k==='c'||k==='C'||k==='a'||k==='A'||k==='s'||k==='S'||k==='p'||k==='P'||k==='u'||k==='U'||k==='x'||k==='X')){blk(e);}
    if(k==='F12')blk(e);
    if(e.ctrlKey&&e.shiftKey&&(k==='I'||k==='J'||k==='C'||k==='K')){blk(e);}
  },true);
})();
</script>

<script id="wy-print-intercept">
(function(){
  try{ window.print = function(){}; }catch(e){}
  document.addEventListener("keydown", function(e){
    if((e.metaKey||e.ctrlKey) && (e.key==="p"||e.key==="P"||e.keyCode===80)){
      e.preventDefault(); e.stopPropagation();
      return false;
    }
  }, true);
})();
</script>
<script id="wy-decoder">
(function(){
  if(!window.__wyReady) return;
  var KEY = "wy-dazhidulun-32-v1";
  function _dec(b64){
    try{
      var raw = atob(b64);
      var bytes = new Uint8Array(raw.length);
      for(var i=0;i<raw.length;i++){
        bytes[i] = (raw.charCodeAt(i) ^ KEY.charCodeAt(i % KEY.length)) & 0xff;
      }
      if(typeof TextDecoder !== "undefined"){
        return new TextDecoder("utf-8").decode(bytes);
      }
      var s = "";
      for(var j=0;j<bytes.length;j++) s += String.fromCharCode(bytes[j]);
      return decodeURIComponent(escape(s));
    }catch(e){ return null; }
  }
  window.__wyReady.then(function(ok){
    if(!ok) return;
    document.querySelectorAll("iframe.ch-frame[data-c]").forEach(function(oldF){
      var decoded = _dec(oldF.getAttribute("data-c"));
      if(!decoded) return;
      var newF = document.createElement("iframe");
      for(var i=0;i<oldF.attributes.length;i++){
        var a = oldF.attributes[i];
        if(a.name === "data-c" || a.name === "srcdoc") continue;
        try{ newF.setAttribute(a.name, a.value); }catch(e){}
      }
      newF.setAttribute("srcdoc", decoded);
      try{ oldF.parentNode.replaceChild(newF, oldF); }catch(e){ return; }
      if(typeof window.setupFrame === "function"){
        try{ window.setupFrame(newF); }catch(e){}
      }
    });
    document.querySelectorAll("[data-wytext]").forEach(function(el){
      var t = _dec(el.getAttribute("data-wytext"));
      if(t === null) return;
      el.innerHTML = t;
      el.removeAttribute("data-wytext");
    });
    if(typeof window.resizeAllFrames === "function"){
      [150, 800, 2000].forEach(function(ms){
        setTimeout(function(){ try{ window.resizeAllFrames(); }catch(e){} }, ms);
      });
    }
  });
})();
</script>
